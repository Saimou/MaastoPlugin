name: Build MaastoPlugin

on: [push, pull_request]

jobs:

  # ─────────────────────────────────────────────
  # Ubuntu build → libQMAASTO_PLUGIN.so
  # ─────────────────────────────────────────────
  ubuntu-build:
    name: Ubuntu (GCC)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout MaastoPlugin
        uses: actions/checkout@v4
        with:
          path: MaastoPlugin

      - name: Checkout CloudCompare v2.13.2
        uses: actions/checkout@v4
        with:
          repository: CloudCompare/CloudCompare
          ref: v2.13.2
          submodules: recursive
          path: CloudCompare

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            qtbase5-dev qttools5-dev qttools5-dev-tools \
            libqt5svg5-dev libqt5opengl5-dev libqt5websockets5-dev \
            libeigen3-dev libjsoncpp-dev liblaszip-dev

      - name: Copy plugin into CloudCompare sources
        run: cp -r MaastoPlugin/plugin CloudCompare/plugins/private/qMaastoPlugin

      - name: Configure CMake
        run: |
          cmake \
            -B CloudCompare/build \
            -S CloudCompare \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEIGEN_ROOT_DIR=/usr/include/eigen3 \
            -DJSON_ROOT_DIR=/usr/include/jsoncpp \
            -DPLUGIN_STANDARD_QMAASTOPLUGIN=ON \
            -DPLUGIN_IO_QCORE=ON \
            -DPLUGIN_IO_QLAS=ON

      - name: Build
        run: cmake --build CloudCompare/build --parallel

      - name: Install
        run: cmake --install CloudCompare/build --prefix install-output

      - name: Find plugin .so
        run: find install-output -name "*.so" | grep -i maasto

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaastoPlugin-ubuntu
          path: install-output/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Windows build → QMAASTO_PLUGIN.dll
  # Qt 5.15.2 msvc2019_64 — täsmää virallisen
  # CloudCompare Windows-installerin kanssa
  # (MSVC 1916, Qt 5.15.2)
  # ─────────────────────────────────────────────
  windows-build:
    name: Windows (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout MaastoPlugin
        uses: actions/checkout@v4
        with:
          path: MaastoPlugin

      - name: Checkout CloudCompare v2.13.2
        uses: actions/checkout@v4
        with:
          repository: CloudCompare/CloudCompare
          ref: v2.13.2
          submodules: recursive
          path: CloudCompare

      - name: Install Qt 5.15.2 (msvc2019_64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Install other dependencies (conda)
        uses: conda-incubator/setup-miniconda@v3
        with:
          architecture: x64
          activate-environment: CloudCompareDeps
          auto-activate-base: false
          mamba-version: "*"
          channels: conda-forge
          channel-priority: strict

      - name: Install eigen and zlib via conda
        shell: bash -l {0}
        run: mamba install -y eigen zlib

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set MSVC as compiler
        run: |
          echo "CXX=cl.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CC=cl.exe"  | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build LASzip from source (v3.4.3)
        shell: bash -l {0}
        run: |
          git clone --depth 1 --branch 3.4.3 https://github.com/LASzip/LASzip.git laszip-src
          cmake \
            -B laszip-src/build \
            -S laszip-src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=laszip-install
          cmake --build laszip-src/build --parallel
          cmake --install laszip-src/build
          # Viedään polut ympäristömuuttujiksi seuraavia vaiheita varten
          echo "LASZIP_LIBRARY=$PWD/laszip-install/lib/laszip3.lib" >> $GITHUB_ENV
          echo "LASZIP_INCLUDE_DIR=$PWD/laszip-install/include"      >> $GITHUB_ENV
          echo "LASZIP_DLL=$PWD/laszip-install/bin/laszip3.dll"      >> $GITHUB_ENV

      - name: Copy plugin into CloudCompare sources
        run: Copy-Item -Recurse MaastoPlugin/plugin CloudCompare/plugins/private/qMaastoPlugin

      - name: Configure CMake
        shell: bash -l {0}
        run: |
          export CONDA_LIB_DIR="$CONDA_PREFIX/Library"
          export EIGEN_ROOT_DIR="$CONDA_LIB_DIR/include/eigen3"
          cmake \
            -B CloudCompare/build \
            -S CloudCompare \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt5_DIR;$CONDA_LIB_DIR" \
            -DEIGEN_ROOT_DIR="$EIGEN_ROOT_DIR" \
            -DLASZIP_LIBRARY="$LASZIP_LIBRARY" \
            -DLASZIP_INCLUDE_DIR="$LASZIP_INCLUDE_DIR" \
            -DLASZIP_DLL="$LASZIP_DLL" \
            -DPLUGIN_STANDARD_QMAASTOPLUGIN=ON \
            -DPLUGIN_IO_QCORE=ON \
            -DPLUGIN_IO_QLAS=ON

      - name: Build
        shell: bash -l {0}
        run: cmake --build CloudCompare/build --parallel

      - name: Install
        shell: bash -l {0}
        run: cmake --install CloudCompare/build --prefix install-output

      - name: Find plugin .dll
        run: Get-ChildItem -Recurse install-output -Filter "*maasto*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaastoPlugin-windows
          path: install-output/
          if-no-files-found: error
